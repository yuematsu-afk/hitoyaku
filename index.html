<script type="text/babel">
const { useState, useEffect, useRef } = React;

window.HY_TWEAKS = { palette: 'green', heroLayout: 'right', cardStyle: 'medium' };
document.documentElement.setAttribute('data-palette', 'green');

function MobileBottomBar() {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const check = () => setVisible(window.innerWidth < 768);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);
  if (!visible) return null;
  return (
    <div style={{
      position:'fixed', bottom:0, left:0, right:0, zIndex:200,
      background:'rgba(255,255,255,.97)', backdropFilter:'blur(8px)',
      borderTop:'1px solid var(--line-soft)',
      padding:'10px 16px 0',
      paddingBottom:'calc(10px + env(safe-area-inset-bottom))',
      display:'flex', gap:8,
    }}>
      <Button variant="ghost" size="md" fullWidth onClick={()=>window.HY_NAV?.('consult')}>相談する</Button>
      <Button variant="deep" size="md" fullWidth iconRight={Ico.arrow} onClick={()=>window.HY_NAV?.('list')}>薬剤師を探す</Button>
    </div>
  );
}

function App() {
  const initPage = (() => {
    const p = new URLSearchParams(window.location.search).get('join');
    if (p === 'pharma') return 'pharma';
    return 'top';
  })();

  const [route, setRoute] = useState({ page: initPage });
  const routeRef = useRef({ page: initPage });
  const historyStack = useRef([]);

  useEffect(() => {
    routeRef.current = route;
  }, [route]);

  useEffect(() => {
    window.HY_NAV = (page, params = {}) => {
      historyStack.current = [...historyStack.current, routeRef.current];
      const next = { page, ...params };
      routeRef.current = next;
      setRoute(next);
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    window.HY_BACK = () => {
      if (historyStack.current.length === 0) return;
      const prev = historyStack.current[historyStack.current.length - 1];
      historyStack.current = historyStack.current.slice(0, -1);
      routeRef.current = prev;
      setRoute(prev);
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
  }, []);

  let view;
  switch (route.page) {
    case 'list':    view = <PageList/>;    break;
    case 'detail':  view = <PageDetail id={route.id}/>;   break;
    case 'consult': view = <PageConsult pharmacistId={route.pharmacistId} mode={route.mode}/>; break;
    case 'corp':    view = <PageCorp/>;    break;
    case 'pharma':       view = <PagePharma/>; break;
    case 'terms':        view = <PageTermsUser/>; break;
    case 'terms-pharma': view = <PageTermsPharma/>; break;
    case 'contact':      view = <PageContact/>; break;
    case 'privacy':      view = <PagePrivacy/>; break;
    case 'tokutei':      view = <PageTokutei/>; break;
    case 'faq':          view = <PageFaqStub/>; break;
    default:        view = <PageTop/>;
  }

  return (
    <>
      <div style={{ minHeight: '100vh', background: 'var(--bg-base)' }}>
        {view}
      </div>
      <MobileBottomBar/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

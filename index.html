<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ヒトヤク — サービスサイト デザイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>

<style>
  /* Canvas-level chrome */
  body { background: #f0eee9; }
  .hy-prototype-frame {
    width: 1440px; height: 900px; background: var(--bg-base);
    border-radius: 16px; overflow: hidden; position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .hy-mobile-frame {
    width: 390px; height: 844px; background: var(--bg-base);
    border-radius: 36px; overflow: hidden; position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  /* Hide tweaks chrome inside sub-iframes */
  .twk-panel { display: none !important; }
</style>
</head>
<body>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>

<!-- Data + UI primitives -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>

<!-- Pages -->
<script type="text/babel" src="page-top.jsx"></script>
<script type="text/babel" src="page-list.jsx"></script>
<script type="text/babel" src="page-detail.jsx"></script>
<script type="text/babel" src="page-consult.jsx"></script>
<script type="text/babel" src="page-corp.jsx"></script>
<script type="text/babel" src="page-pharma.jsx"></script>

<!-- Prototype router -->
<script type="text/babel" src="prototype.jsx"></script>

<!-- Reference artboards -->
<script type="text/babel" src="artboard-sitemap.jsx"></script>
<script type="text/babel" src="artboard-system.jsx"></script>
<script type="text/babel" src="artboard-notes.jsx"></script>

<!-- Tweaks + Canvas -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// Single source of truth for tweaks → propagated to window.HY_TWEAKS so
// nested page components (Hero, PharmacistCard) can read without re-render plumbing.
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "green",
  "heroLayout": "right",
  "cardStyle": "medium"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // expose to non-react consumers (page components read from window.HY_TWEAKS)
  useEffect(() => {
    window.HY_TWEAKS = t;
    document.documentElement.setAttribute('data-palette', t.palette);
  }, [t]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="overview" title="ヒトヤク" subtitle="薬剤師を選べる健康相談 — サービスサイト全体デザイン">
          <DCArtboard id="sitemap" label="01 · サイトマップと情報設計" width={1440} height={1500}>
            <ArtboardSitemap/>
          </DCArtboard>
        </DCSection>

        <DCSection id="prototype" title="インタラクティブプロトタイプ" subtitle="↑ クリックで詳細遷移・検索フィルタ・フォーム入力が動作">
          <DCArtboard id="proto-top" label="01 · トップページ" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'top'}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="proto-list" label="02 · 薬剤師一覧 (検索/フィルタ動作)" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'list'}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="proto-detail" label="03 · 薬剤師詳細 (最重要ページ)" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'detail', id:'p01'}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="proto-consult" label="04 · 相談フォーム" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'consult'}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="proto-corp" label="05 · 法人向け" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'corp'}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="proto-pharma" label="06 · 薬剤師・薬局向け" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'pharma'}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="proto-faq" label="07 · FAQ" width={1440} height={900}>
            <div className="hy-prototype-frame">
              <HitoyakuPrototype initial={{page:'faq'}}/>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="mobile" title="モバイル表示" subtitle="iPhone (390×844) — 主要画面のスマホ最適化">
          <DCArtboard id="m-top" label="モバイル · トップ" width={390} height={844}>
            <MobileViewport><HitoyakuPrototype initial={{page:'top'}}/></MobileViewport>
          </DCArtboard>
          <DCArtboard id="m-list" label="モバイル · 一覧" width={390} height={844}>
            <MobileViewport><HitoyakuPrototype initial={{page:'list'}}/></MobileViewport>
          </DCArtboard>
          <DCArtboard id="m-detail" label="モバイル · 薬剤師詳細" width={390} height={844}>
            <MobileViewport><HitoyakuPrototype initial={{page:'detail', id:'p01'}}/></MobileViewport>
          </DCArtboard>
        </DCSection>

        <DCSection id="system" title="デザインシステム" subtitle="トークン・タイポグラフィ・コンポーネント">
          <DCArtboard id="ds" label="デザインシステム" width={1440} height={2200}>
            <ArtboardSystem/>
          </DCArtboard>
        </DCSection>

        <DCSection id="handoff" title="Claude Code 実装ハンドオフ" subtitle="技術スタック・コンポーネント一覧・データモデル">
          <DCArtboard id="notes" label="実装メモ" width={1440} height={2000}>
            <ArtboardNotes/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="ヒトヤク Tweaks">
        <TweakSection label="ブランド">
          <TweakColor
            label="メインカラー"
            value={t.palette}
            options={[
              {value:'green', colors:['#355E45','#4A7A5C','#C9DDD3']},
              {value:'mint',  colors:['#2F6F66','#3F9088','#CCE5E1']},
              {value:'blue',  colors:['#2C4F75','#4775A1','#D2DEEC']},
              {value:'beige', colors:['#6E4F2C','#9C7647','#E8D9C0']},
            ].map(o => o.colors)}
            onChange={(v) => {
              // TweakColor passes back the value; map array back to key
              const map = { '#355E45':'green','#2F6F66':'mint','#2C4F75':'blue','#6E4F2C':'beige' };
              const key = Array.isArray(v) ? map[v[0]] : map[v] || 'green';
              setTweak('palette', key);
            }}
          />
        </TweakSection>
        <TweakSection label="トップ ヒーロー">
          <TweakRadio
            label="レイアウト"
            value={t.heroLayout}
            options={[
              {value:'left',      label:'写真 左'},
              {value:'right',     label:'写真 右'},
              {value:'fullbleed', label:'全幅'},
            ]}
            onChange={(v) => setTweak('heroLayout', v)}
          />
        </TweakSection>
        <TweakSection label="薬剤師カード">
          <TweakRadio
            label="スタイル"
            value={t.cardStyle}
            options={[
              {value:'large',   label:'写真大'},
              {value:'medium',  label:'標準'},
              {value:'row',     label:'横並び'},
              {value:'compact', label:'コンパクト'},
            ]}
            onChange={(v) => setTweak('cardStyle', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// Mobile viewport — sets HY_MOBILE flag inside its subtree so MobileBottomCTA renders.
function MobileViewport({ children }) {
  React.useEffect(() => {
    // crude — we only set when mobile artboards exist in DOM; safe globally for this preview.
    window.HY_MOBILE = true;
  }, []);
  return (
    <div style={{
      width:390, height:844, background:'var(--bg-base)',
      borderRadius:36, overflow:'hidden', position:'relative',
      border:'8px solid #1F2A24',
    }}>
      {/* Status bar */}
      <div style={{
        height:36, background:'#fff', display:'flex', alignItems:'center',
        justifyContent:'space-between', padding:'0 22px', fontSize:13, fontWeight:600,
        position:'relative', zIndex:50, borderBottom:'1px solid var(--line-soft)',
      }}>
        <span>9:41</span>
        <span style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{width:18,height:10,border:'1px solid #1F2A24',borderRadius:2,position:'relative'}}>
            <span style={{position:'absolute',inset:1,background:'#1F2A24',width:'70%'}}/>
          </span>
        </span>
      </div>
      <div style={{position:'absolute', top:36, left:0, right:0, bottom:0}}>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>

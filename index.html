<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ヒトヤク — 薬剤師を選んで、相談できるサービス</title>
<meta name="description" content="飲み合わせ、副作用、受診の目安。日常の薬の疑問を、自分に合った薬剤師にゆっくり相談できる場所です。"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-base); }
  #root { min-height: 100vh; }
</style>
</head>
<body>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>

<!-- Data + UI primitives -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>

<!-- Pages -->
<script type="text/babel" src="page-top.jsx"></script>
<script type="text/babel" src="page-list.jsx"></script>
<script type="text/babel" src="page-detail.jsx"></script>
<script type="text/babel" src="page-consult.jsx"></script>
<script type="text/babel" src="page-corp.jsx"></script>
<script type="text/babel" src="page-pharma.jsx"></script>

<!-- Prototype router (still exports HitoyakuPrototype for backward compat) -->
<script type="text/babel" src="prototype.jsx"></script>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = {
  "palette": "green",
  "heroLayout": "right",
  "cardStyle": "medium"
};

function MobileBottomBar() {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const check = () => setVisible(window.innerWidth < 768);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);
  if (!visible) return null;
  return (
    <div style={{
      position:'fixed', bottom:0, left:0, right:0, zIndex:200,
      background:'rgba(255,255,255,.97)', backdropFilter:'blur(8px)',
      borderTop:'1px solid var(--line-soft)',
      padding:'10px 16px 10px',
      display:'flex', gap:8,
    }}>
      <Button variant="ghost" size="md" fullWidth onClick={()=>window.HY_NAV?.('consult')}>相談する</Button>
      <Button variant="deep" size="md" fullWidth iconRight={Ico.arrow} onClick={()=>window.HY_NAV?.('list')}>薬剤師を探す</Button>
    </div>
  );
}

function App() {
  const [route, setRoute] = useState({ page: 'top' });
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [panelOpen, setPanelOpen] = useState(false);

  useEffect(() => {
    window.HY_TWEAKS = t;
    document.documentElement.setAttribute('data-palette', t.palette);
  }, [t]);

  useEffect(() => {
    window.HY_NAV = (page, params = {}) => {
      setRoute({ page, ...params });
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
  }, []);

  let view;
  switch (route.page) {
    case 'list':    view = <PageList/>;    break;
    case 'detail':  view = <PageDetail id={route.id}/>;   break;
    case 'consult': view = <PageConsult pharmacistId={route.pharmacistId} mode={route.mode}/>; break;
    case 'corp':    view = <PageCorp/>;    break;
    case 'pharma':  view = <PagePharma/>; break;
    case 'faq':     view = <PageFaqStub/>; break;
    default:        view = <PageTop/>;
  }

  const openPanel = () => {
    setPanelOpen(true);
    window.postMessage({ type: '__activate_edit_mode' }, '*');
  };

  return (
    <>
      <div style={{ minHeight: '100vh', background: 'var(--bg-base)' }}>
        {view}
      </div>

      <MobileBottomBar/>

      {!panelOpen && (
        <button onClick={openPanel} style={{
          position: 'fixed', bottom: 16, right: 16, zIndex: 2147483645,
          background: 'rgba(53,94,69,0.90)', color: '#f1ead8',
          border: 'none', borderRadius: 8, padding: '8px 14px',
          fontSize: 12, fontWeight: 600, letterSpacing: '0.05em',
          cursor: 'pointer', backdropFilter: 'blur(8px)',
          boxShadow: '0 2px 12px rgba(0,0,0,0.25)',
        }}>⚙ Tweaks</button>
      )}

      <TweaksPanel title="ヒトヤク Tweaks">
        <TweakSection label="ブランド">
          <TweakColor
            label="メインカラー"
            value={t.palette}
            options={[
              ['#355E45','#4A7A5C','#C9DDD3'],
              ['#2F6F66','#3F9088','#CCE5E1'],
              ['#2C4F75','#4775A1','#D2DEEC'],
              ['#6E4F2C','#9C7647','#E8D9C0'],
            ]}
            onChange={(v) => {
              const map = { '#355E45':'green','#2F6F66':'mint','#2C4F75':'blue','#6E4F2C':'beige' };
              const key = Array.isArray(v) ? map[v[0]] : map[v] || 'green';
              setTweak('palette', key);
            }}
          />
        </TweakSection>
        <TweakSection label="トップ ヒーロー">
          <TweakRadio
            label="レイアウト"
            value={t.heroLayout}
            options={[
              {value:'left',      label:'写真 左'},
              {value:'right',     label:'写真 右'},
              {value:'fullbleed', label:'全幅'},
            ]}
            onChange={(v) => setTweak('heroLayout', v)}
          />
        </TweakSection>
        <TweakSection label="薬剤師カード">
          <TweakRadio
            label="スタイル"
            value={t.cardStyle}
            options={[
              {value:'large',   label:'写真大'},
              {value:'medium',  label:'標準'},
              {value:'row',     label:'横並び'},
              {value:'compact', label:'コンパクト'},
            ]}
            onChange={(v) => setTweak('cardStyle', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
